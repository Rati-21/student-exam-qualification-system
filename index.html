<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Qualify Checker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Do you qualify?</h1>
    <form id="marksForm">
      <label>Test 1 Percentage</label>
      <input type="number" id="test1" required> <br><br><br>

      <label>Test 2 Percentage</label>
      <input type="number" id="test2" required> <br><br><br>

      <label>Assignment Percentage</label>
      <input type="number" id="assignment" required> <br><br><br>

      <label>Project Percentage</label>
      <input type="number" id="project" required> <br><br><br><br>

      <button type="submit">Check</button>
    </form>
    <div id="result"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
